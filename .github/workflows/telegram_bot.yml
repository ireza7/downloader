name: Telegram Bot (Hourly Long Poll)

#on:
#  schedule:
#    - cron: '0 * * * *'      # اجرای ساعتی
  workflow_dispatch:

concurrency:
  group: telegram-bot        # اطمینان از اجرای تک‌نمونه
  cancel-in-progress: true   # اجرای قبلی در صورت شروع جدید لغو شود

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55      # حداکثر ۵۵ دقیقه (وقفه‌ای کمتر از ۵ دقیقه)
    permissions:
      contents: write        # نیاز به نوشتن offset.txt
      actions: write         # نیاز به dispatch کردن ورک‌فلو دانلود

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Telegram Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # توکن خودکار گیتهاب با دسترسی actions:write
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: go run bot.go
