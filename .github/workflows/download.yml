name: Download via Trigger File

on:
  push:
    paths:
      - 'trigger_download.txt'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Parse trigger and download
        run: go run download.go

      - name: Commit and reset trigger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/ || true

          # اگر تغییراتی در downloads بود commit کن
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded file(s)"
          fi

          # بازنشانی فایل محرک به حالت اولیه
          {
            echo '# اگر لینک های خود را در زیر این کامنت وارد کنید فایل ها بدون تغییر به صورت ساده ذخیره میشوند'
            echo ''
            echo '# اگر لینک هارا زیر این کامنت وارد کنید همه فایل ها در یک فایل فشرده زیپ ذخیره میشوند'
            echo ''
            echo '# اگر لینک هارا زیر این کامنت وارد کنید هر فایل به صورت یک فایل فشرده زیپ ذخیره میشوند'
            echo ''
          } > trigger_download.txt

          git add trigger_download.txt
          git commit -m "Reset trigger file [skip ci]"
          git push