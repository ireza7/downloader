name: Download via Trigger File

on:
  push:
    paths:
      - 'trigger_download.txt'

jobs:
  download:
    runs-on: ubuntu-latest
    container: python:3.11-alpine
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install requests

      - name: Run downloader
        run: python download_trigger.py

      - name: Commit new files and reset trigger
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add downloads/ || true
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded file(s)"
          fi
          echo '# اگر لینک های خود را در زیر این کامنت وارد کنید فایل ها بدون تغییر به صورت ساده ذخیره میشوند' > trigger_download.txt
          echo '' >> trigger_download.txt
          echo '# اگر لینک هارا زیر این کامنت وارد کنید همه فایل ها در یک فایل فشرده زیپ ذخیره میشوند' >> trigger_download.txt
          echo '' >> trigger_download.txt
          echo '# اگر لینک هارا زیر این کامنت وارد کنید هر فایل به صورت یک فایل فشرده زیپ ذخیره میشوند' >> trigger_download.txt
          echo '' >> trigger_download.txt
          git add trigger_download.txt
          git commit -m "Reset trigger file [skip ci]"
          git push