name: Download via Trigger File

on:
  push:
    paths:
      - 'trigger_download.txt'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # نیاز به commit و push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Parse trigger and download
        run: go run download.go

      - name: Commit and reset trigger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/ || true
          
          # اگر تغییراتی در downloads بود commit کن
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded file(s)"
          fi
          
          # بازنشانی فایل محرک به حالت اولیه (با کامنت‌های راهنما)
          cat > trigger_download.txt << 'EOF'
# اگر لینک های خود را در زیر این کامنت وارد کنید فایل ها بدون تغییر به صورت ساده ذخیره میشوند

# اگر لینک هارا زیر این کامنت وارد کنید همه فایل ها در یک فایل فشرده زیپ ذخیره میشوند

# اگر لینک هارا زیر این کامنت وارد کنید هر فایل به صورت یک فایل فشرده زیپ ذخیره میشوند

EOF
          git add trigger_download.txt
          git commit -m "Reset trigger file [skip ci]"
          git push